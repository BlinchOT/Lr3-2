on:
  push:
    - workflows:
        - deploy-site
      filter:
        branches:
          - main

workflows:
  deploy-site:
    tasks:
      - deploy-task

tasks:
  - name: deploy-task
    cubes:
      - name: copy-files
        script:
          - mkdir -p site
          - cp -r docs/* site/
        artifacts:
          paths:
            - site/*