# Файл: .sourcecraft/ci.yaml
on:
  push:
    - workflows: [ "deploy-site" ]
      filter:
        branches: [ "main" ]

workflows:
  deploy-site:
    tasks:
      - name: "deploy-task"

tasks:
  - name: "deploy-task"
    cubes:
      - name: "copy-files"
        script: |
          echo "Копируем файлы сайта из папки docs в site"
          mkdir -p site
          cp -r docs/* site/
          echo "Копирование завершено."
    artifacts:
      - "site/*"